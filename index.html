<!DOCTYPE html>
<html lang="en">
<head>

    <!-- BASIC -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TheSignnal</title>

<style>

body{
    margin:0;
    padding:0;
    background:#066b06;
    font-family:Arial, sans-serif;
    min-height:100vh;

}

.master-menucontainer{
    width:100%;
    height:100vh;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    grid-auto-rows:400px;
    overflow-y:auto;

}

.menu-card{

    position:relative;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    border:2px solid #000;
    background:#067006;
    color:#fff;
    text-align:center;

    cursor:pointer;

    transition:0.2s;

}



.menu-card:hover{
    z-index:999;
    transform:scale(1);
    background:#02d066;
    border-radius:25px;
    box-shadow:0 0 40px rgba(0,0,0,0.7);

}

.menu-icon{
    font-size:40px;
    margin-bottom:20px;

}


.menu-title{
    font-size:40px;
    font-weight:normal;
}


/* =========================================
   MOBILE RESPONSIVE
========================================= */

@media(max-width:700px){

    .master-menucontainer{

        /* 2 COLUMNS ON MOBILE */
        grid-template-columns:repeat(2, 1fr);

    }

}

</style>
</head>

<body>



<!-- =========================================
     MASTER MENU
========================================= -->

<div class="master-menucontainer">



    <!-- DESIGN 2D -->
    <div class="menu-card">

        <div class="menu-icon">🎨</div>

        <div class="menu-title">
            Design 2D
        </div>

    </div>



    <!-- DESIGN 3D -->
    <div class="menu-card">

        <div class="menu-icon">🌈</div>

        <div class="menu-title">
            Design 3D
        </div>

    </div>



    <!-- BROWSER -->
    <div class="menu-card">

        <div class="menu-icon">🌐</div>

        <div class="menu-title">
            Browser
        </div>

    </div>



    <!-- AI CHAT -->
    <div class="menu-card">

        <div class="menu-icon">📰</div>

        <div class="menu-title">
            AI CHAT
        </div>

    </div>



    <!-- CREATE IMAGE -->
    <div class="menu-card">

        <div class="menu-icon">📷</div>

        <div class="menu-title">
            Create Image
        </div>

    </div>



    <!-- CREATE VIDEO -->
    <div class="menu-card">

        <div class="menu-icon">📹</div>

        <div class="menu-title">
            CREATE VIDEO
        </div>

    </div>



    <!-- EXTRA MENU -->
    <div class="menu-card">

        <div class="menu-icon">🎵</div>

        <div class="menu-title">
            Music Studio
        </div>

    </div>



    <!-- EXTRA MENU -->
    <div class="menu-card">

        <div class="menu-icon">🛒</div>

        <div class="menu-title">
            Store
        </div>

    </div>



    <!-- EXTRA MENU -->
    <div class="menu-card">

        <div class="menu-icon">⚙️</div>

        <div class="menu-title">
            Settings
        </div>

    </div>



</div>

</body>
</html>
