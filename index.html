<!DOCTYPE html>
<html lang="en">
<head>

    <!-- BASIC -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TheSignnal</title>

<style>

body{
    margin:0;
    padding:0;
    background:#066b06;
    font-family:Arial, sans-serif;
    min-height:100vh;

}

.master-menucontainer{
    width:100%;
    height:100vh;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    grid-auto-rows:400px;
    overflow-y:auto;

}

.menu-card{

    position:relative;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    border:2px solid #000;
    background:#067006;
    color:#fff;
    text-align:center;

    cursor:pointer;

    transition:0.2s;

}



.menu-card:hover{
    z-index:999;
    transform:scale(1);
    background:#02d066;
    border-radius:25px;
    box-shadow:0 0 40px rgba(0,0,0,0.7);

}

.menu-icon{
    font-size:40px;
    margin-bottom:20px;

}


.menu-title{
    font-size:40px;
    font-weight:normal;
}

/* =========================================
   FULLSCREEN MODAL
========================================= */

.website-modal{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100vh;

    background:#000;

    z-index:5000;

    display:none;

    flex-direction:column;

}



/* =========================================
   CLOSE BUTTON
========================================= */

.close-modal{

    height:60px;

    border:none;

    background:#067006;

    color:#fff;

    font-size:20px;

    cursor:pointer;

}



/* =========================================
   IFRAME
========================================= */

.website-frame{

    width:100%;

    height:calc(100vh - 60px);

    border:none;

}


/* =========================================
   MOBILE RESPONSIVE
========================================= */

@media(max-width:700px){

    .master-menucontainer{

        /* 2 COLUMNS ON MOBILE */
        grid-template-columns:repeat(2, 1fr);
        grid-auto-rows: 220px;

    .menu-icon{
        font-size:25px;
        margin-bottom:10px;
    }

    .menu-title{
        font-size:20px;
    }

    .menu-card:last-child{
        grid-column:span 2;
    }

    }



}

</style>
</head>

<body>



<div class="master-menucontainer">

    <!-- QUOTES APP -->
    <div class="menu-card" onclick="openStandaloneApp('QuotesProtocols.html')">
        <div class="menu-icon">🎨</div>
        <div class="menu-title">
            Quotes Protocols
        </div>

    </div>


    <!-- DESIGN 3D -->
    <div class="menu-card">

        <div class="menu-icon">🌈</div>

        <div class="menu-title">
            Design 3D
        </div>

    </div>



    <!-- BROWSER -->
    <div class="menu-card">

        <div class="menu-icon">🌐</div>

        <div class="menu-title">
            Browser
        </div>

    </div>



    <!-- AI CHAT -->
    <div class="menu-card">

        <div class="menu-icon">📰</div>

        <div class="menu-title">
            AI CHAT
        </div>

    </div>



    <!-- CREATE IMAGE -->
    <div class="menu-card">

        <div class="menu-icon">📷</div>

        <div class="menu-title">
            Create Image
        </div>

    </div>



    <!-- CREATE VIDEO -->
    <div class="menu-card">

        <div class="menu-icon">📹</div>

        <div class="menu-title">
            CREATE VIDEO
        </div>

    </div>



    <!-- EXTRA MENU -->
    <div class="menu-card">

        <div class="menu-icon">🎵</div>

        <div class="menu-title">
            Music Studio
        </div>

    </div>



    <!-- EXTRA MENU -->
    <div class="menu-card">

        <div class="menu-icon">🛒</div>

        <div class="menu-title">
            Store
        </div>

    </div>



    <!-- EXTRA MENU -->
    <div class="menu-card">

        <div class="menu-icon">⚙️</div>

        <div class="menu-title">
            Settings
        </div>

    </div>


    
<script>

/* =========================================
   OPEN STANDALONE APP
========================================= */

async function openStandaloneApp(file){

    let response = await fetch(file);

    let html = await response.text();

    document.open();
    
    document.write(html);

    document.close();

}


</script>

</div>

</body>
</html>
